<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI & VFX | GameOnAI Studio</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body style="text-align: center;">
    <a href="../index.html" class="btn-primary"
        style="position: fixed; top: 32px; left: 32px; padding: 10px 20px; font-size: 0.85rem; z-index:1000;">← Back</a>

    <header class="section"
        style="min-height: 60vh; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--glass-border);">
        <div class="container">
            <span class="hero-tag reveal">Polishing Phase</span>
            <h1 class="hero-title reveal">UI / UX / <span class="gradient-text">VFX & GFX</span></h1>
            <p class="hero-subtitle reveal">Modern HUDs, gorgeous branding, and stunning particle systems.</p>
        </div>
    </header>

    <main class="container" style="padding: 100px 0;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;">
            <div class="service-card reveal">
                <h3>HUD Design</h3>
                <p>Intuitive in-game interfaces.</p>
            </div>
            <div class="service-card reveal">
                <h3>Game Branding</h3>
                <p>Logos, thumbnails, and GFX.</p>
            </div>
            <div class="service-card reveal">
                <h3>Particle Effects</h3>
                <p>Explosions, magic, and skill VFX.</p>
            </div>
        </div>

        <section style="margin-top: 120px;">
            <div class="section-header reveal">
                <h2>DESIGN <span class="gradient-text">SHOWCASE</span></h2>
            </div>
            <div class="portfolio-masonry reveal">
                <div class="masonry-item"><img
                        src="https://images.unsplash.com/photo-1551033406-611cf9a28f67?auto=format&fit=crop&q=80&w=800"
                        alt="Design 1"></div>
            </div>
        </section>
    </main>
    <script type="module" src="../main.js"></script>
</body>

</html>
