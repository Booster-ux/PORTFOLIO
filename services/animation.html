<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Studio | GameOnAI</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../services.css">
</head>

<body style="opacity:0; transition: opacity 0.5s ease;">
    <a href="../index.html" class="nav-link glass back-btn">← Back to Studio</a>

    <header class="service-hero">
        <div class="service-hero-bg"
            style="background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=1500');">
        </div>
        <div class="container service-hero-content">
            <h1 class="reveal" style="font-size: 4rem;">Animation <span class="gradient-text">Studio</span></h1>
            <p class="reveal" style="max-width: 600px; color: var(--text-dim);">Fluid character motions and cinematic
                sequences that breathe life into your game.</p>
        </div>
    </header>

    <main class="container">
        <section id="portfolio-showcase">
            <h2 class="reveal">MOTION <span class="gradient-text">SHOWREEL</span></h2>
            <div class="portfolio-grid">
                <div class="portfolio-item glass reveal">
                    <img src="https://images.unsplash.com/photo-1542751110-97427bbecf20?auto=format&fit=crop&q=80&w=1000"
                        alt="Animation 1">
                    <div class="portfolio-overlay"><span>WATCH MOTION</span></div>
                </div>
            </div>
        </section>

        <section id="process">
            <h2 class="reveal">OUR <span class="gradient-text">PROCESS</span></h2>
            <div class="process-list" style="margin-top: 40px;">
                <div class="process-step reveal">
                    <div class="step-number">01</div>
                    <div class="step-content">
                        <h3>Keyframing & Physics</h3>
                        <p>Creating expressive and responsive character movements.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import gsap from 'gsap';
        import { ScrollTrigger } from 'gsap/ScrollTrigger';
        import Lenis from 'lenis';
        gsap.registerPlugin(ScrollTrigger);
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
        window.addEventListener('load', () => {
            document.body.style.opacity = '1';
            const reveals = document.querySelectorAll('.reveal');
            reveals.forEach((el) => {
                gsap.fromTo(el, { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 1, ease: 'power3.out', scrollTrigger: { trigger: el, start: 'top 90%' } });
            });
        });
    </script>
</body>

</html>
