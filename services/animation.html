<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Animation | GameOnAI Studio</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body style="text-align: center;">
    <a href="../index.html" class="btn-primary"
        style="position: fixed; top: 32px; left: 32px; padding: 10px 20px; font-size: 0.85rem; z-index:1000;">← Back</a>

    <header class="section"
        style="min-height: 60vh; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--glass-border);">
        <div class="container">
            <span class="hero-tag reveal">Motion Studio</span>
            <h1 class="hero-title reveal">STUDIO <br><span class="gradient-text">ANIMATION</span></h1>
            <p class="hero-subtitle reveal">Fluid combat, cinematic sequences, and expressive locomotion for R6 & R15.
            </p>
        </div>
    </header>

    <main class="container" style="padding: 100px 0;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;">
            <div class="service-card reveal">
                <h3>Combat Moves</h3>
                <p>Sword combat, combos, and skills.</p>
            </div>
            <div class="service-card reveal">
                <h3>Locomotion</h3>
                <p>Advanced run cycles and idles.</p>
            </div>
            <div class="service-card reveal">
                <h3>Cinematics</h3>
                <p>In-game story moments and cutscenes.</p>
            </div>
        </div>

        <section style="margin-top: 120px;">
            <div class="section-header reveal">
                <h2>MOTION <span class="gradient-text">PORTFOLIO</span></h2>
            </div>
            <div class="portfolio-masonry reveal">
                <!-- User will upload MP4/GIF later -->
                <div class="masonry-item"><img
                        src="https://images.unsplash.com/photo-1542751110-97427bbecf20?auto=format&fit=crop&q=80&w=800"
                        alt="Anim 1"></div>
            </div>
        </section>
    </main>
    <script type="module" src="../main.js"></script>
</body>

</html>
