<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Assets | GameOnAI Studio</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body style="text-align: center;">
    <a href="../index.html" class="btn-primary"
        style="position: fixed; top: 32px; left: 32px; padding: 10px 20px; font-size: 0.85rem; z-index:1000;">← Back</a>

    <header class="section"
        style="min-height: 60vh; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--glass-border);">
        <div class="container">
            <span class="hero-tag reveal">Modular Components</span>
            <h1 class="hero-title reveal">CUSTOM GAME <br><span class="gradient-text">ASSETS</span></h1>
            <p class="hero-subtitle reveal">High-quality, optimized 3D models tailored for the Roblox engine.</p>
        </div>
    </header>

    <main class="container" style="padding: 100px 0;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;">
            <div class="service-card reveal">
                <h3>Weapons</h3>
                <p>Melee and ranged combat gear.</p>
            </div>
            <div class="service-card reveal">
                <h3>Vehicles</h3>
                <p>Cars, planes, and mounts.</p>
            </div>
            <div class="service-card reveal">
                <h3>Props</h3>
                <p>Atmospheric environmental objects.</p>
            </div>
        </div>

        <section style="margin-top: 120px;">
            <div class="section-header reveal">
                <h2>ASSET <span class="gradient-text">LIBRARY</span></h2>
            </div>
            <div class="portfolio-masonry reveal">
                <div class="masonry-item"><img
                        src="https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&q=80&w=800"
                        alt="Asset 1"></div>
            </div>
        </section>
    </main>
    <script type="module" src="../main.js"></script>
</body>

</html>
