<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environment Design | GameOnAI Studio</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body style="text-align: center;">
    <a href="../index.html" class="btn-primary"
        style="position: fixed; top: 32px; left: 32px; padding: 10px 20px; font-size: 0.85rem; z-index:1000;">← Back</a>

    <header class="section"
        style="min-height: 60vh; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--glass-border);">
        <div class="container">
            <span class="hero-tag reveal">World Building</span>
            <h1 class="hero-title reveal">ENVIRONMENT <br><span class="gradient-text">DESIGN</span></h1>
            <p class="hero-subtitle reveal">Breathtaking maps with professional lighting and high-end asset integration.
            </p>
        </div>
    </header>

    <main class="container" style="padding: 100px 0;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px;">
            <div class="service-card reveal">
                <h3>Atmospheric Lighting</h3>
                <p>Day/night cycles and custom shadows.</p>
            </div>
            <div class="service-card reveal">
                <h3>Custom Terrain</h3>
                <p>Smooth, realistic landscapes.</p>
            </div>
            <div class="service-card reveal">
                <h3>Map Polishing</h3>
                <p>Optimized for mobile and low-end PCs.</p>
            </div>
        </div>

        <section style="margin-top: 120px;">
            <div class="section-header reveal">
                <h2>WORLD <span class="gradient-text">GALLERY</span></h2>
            </div>
            <div class="portfolio-masonry reveal">
                <div class="masonry-item"><img
                        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=800"
                        alt="Map 1"></div>
            </div>
        </section>
    </main>
    <script type="module" src="../main.js"></script>
</body>

</html>
